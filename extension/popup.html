<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preciprocal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #090d1a;
      --glass:       rgba(255,255,255,0.055);
      --glass-hover: rgba(255,255,255,0.085);
      --border:      rgba(255,255,255,0.09);
      --border-lit:  rgba(255,255,255,0.14);
      --txt:         rgba(255,255,255,0.94);
      --txt2:        rgba(255,255,255,0.52);
      --txt3:        rgba(255,255,255,0.28);
      --accent:      #5b6ef5;
      --accent2:     #7c3aed;
      --green:       #34d399;
      --green-bg:    rgba(52,211,153,0.12);
      --green-br:    rgba(52,211,153,0.25);
      --red:         #f87171;
      --red-bg:      rgba(248,113,113,0.1);
      --red-br:      rgba(248,113,113,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 360px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 260px 220px at 10%  5%,  rgba(91,110,245,0.22)  0%, transparent 70%),
        radial-gradient(ellipse 220px 200px at 88% 12%,  rgba(124,58,237,0.18)  0%, transparent 70%),
        radial-gradient(ellipse 200px 180px at 8%  88%,  rgba(59,130,246,0.14)  0%, transparent 70%),
        radial-gradient(ellipse 180px 160px at 92% 92%,  rgba(6,182,212,0.12)   0%, transparent 70%);
    }

    #root {
      position: relative; z-index: 1;
      animation: fadeUp 0.22s ease both;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ═══════════════════════════
       HEADER
    ═══════════════════════════ */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .hdr-brand { display: flex; align-items: center; gap: 9px; }
    .hdr-ico {
      width: 30px; height: 30px; border-radius: 9px;
      background: rgba(91,110,245,0.18);
      border: 1px solid rgba(91,110,245,0.3);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .hdr-ico img { width: 20px; height: 20px; display: block; border-radius: 4px; }
    .hdr-name { font-size: 15px; font-weight: 800; color: var(--txt); letter-spacing: -0.03em; }

    .pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .pill.on  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-br); }
    .pill.off { background: var(--glass);    color: var(--txt3);  border: 1px solid var(--border);  }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .dot.pulse { animation: pulse 2s ease-in-out infinite; }

    /* ═══════════════════════════
       LOADING
    ═══════════════════════════ */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px; gap: 14px;
    }
    .spin-ring {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading p { font-size: 13px; color: var(--txt3); }

    /* ═══════════════════════════
       CONNECTED VIEW
    ═══════════════════════════ */
    .connected-wrap {
      padding: 20px 16px 22px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 15px;
      background: var(--glass);
      border: 1px solid var(--border-lit);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .av-wrap { position: relative; flex-shrink: 0; }
    .av {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(91,110,245,0.35), rgba(124,58,237,0.25));
      border: 2px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #a5b4fc;
      overflow: hidden;
    }
    .av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .av-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 18px; height: 18px; border-radius: 6px;
      background: var(--bg);
      border: 1.5px solid var(--border-lit);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .av-badge img { width: 12px; height: 12px; display: block; border-radius: 2px; }
    .u-info { flex: 1; min-width: 0; }
    .u-name {
      font-size: 14px; font-weight: 700; color: var(--txt);
      letter-spacing: -0.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .u-email {
      font-size: 11.5px; color: var(--txt2); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tier {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 4px 9px; border-radius: 6px;
      background: var(--glass); color: var(--txt2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tier.pro {
      background: rgba(91,110,245,0.14);
      color: #a5b4fc;
      border-color: rgba(91,110,245,0.25);
    }

    .btn-main {
      width: 100%; padding: 13px; border-radius: 12px;
      font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em;
      cursor: pointer; border: none; font-family: inherit;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(91,110,245,0.3);
      transition: all 0.15s;
    }
    .btn-main:hover { box-shadow: 0 6px 28px rgba(91,110,245,0.45); transform: translateY(-1px); }
    .btn-main:active { transform: none; }

    .btn-danger {
      width: 100%; padding: 11px; border-radius: 12px;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      background: var(--red-bg); color: var(--red);
      border: 1px solid var(--red-br);
      transition: all 0.15s;
    }
    .btn-danger:hover {
      background: rgba(248,113,113,0.16);
      border-color: rgba(248,113,113,0.32);
      transform: translateY(-1px);
    }
    .btn-danger:active { transform: none; }

    /* ═══════════════════════════
       DISCONNECTED HERO
    ═══════════════════════════ */
    .hero {
      padding: 28px 18px 22px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .hero-logo {
      width: 60px; height: 60px; border-radius: 18px;
      background: rgba(91,110,245,0.14);
      border: 1px solid rgba(91,110,245,0.28);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; overflow: hidden;
    }
    .hero-logo img { width: 38px; height: 38px; display: block; border-radius: 9px; }
    .hero-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--txt3); margin-bottom: 10px;
    }
    .hero-h {
      font-size: 23px; font-weight: 800; color: var(--txt);
      letter-spacing: -0.04em; line-height: 1.2; margin-bottom: 11px;
    }
    .hero-sub { font-size: 13px; color: var(--txt2); line-height: 1.65; }

    .fc-list {
      margin: 16px 16px 0;
      background: var(--glass);
      border: 1px solid var(--border-lit);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .fc-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--border);
    }
    .fc-row:last-child { border-bottom: none; }
    .fc-ico {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .fc-ico.i1 { background: rgba(99,102,241,0.2);  }
    .fc-ico.i2 { background: rgba(16,185,129,0.16); }
    .fc-ico.i3 { background: rgba(245,158,11,0.16); }
    .fc-title { font-size: 13px; font-weight: 700; color: var(--txt); letter-spacing: -0.01em; }
    .fc-desc  { font-size: 11.5px; color: var(--txt2); margin-top: 4px; line-height: 1.5; }

    .si-block { padding: 16px 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn-si {
      width: 100%; padding: 13px; border-radius: 12px;
      font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
      cursor: pointer; border: none; font-family: inherit;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(91,110,245,0.3);
      transition: all 0.15s;
    }
    .btn-si:hover { box-shadow: 0 6px 28px rgba(91,110,245,0.45); transform: translateY(-1px); }
    .btn-si:active { transform: none; }

    .how-box {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 13px 15px;
      backdrop-filter: blur(14px);
    }
    .how-lbl {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--txt3); margin-bottom: 9px;
    }
    .how-box ol { padding-left: 16px; display: flex; flex-direction: column; gap: 5px; }
    .how-box li { font-size: 12px; color: var(--txt2); line-height: 1.5; }
  </style>
</head>
<body>
  <div id="root">
    <div id="authContainer"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
