<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preciprocal Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
    }

    #authContainer {
      padding: 24px;
    }

    /* Loading View */
    .loading-view {
      text-align: center;
      padding: 40px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid rgba(168, 85, 247, 0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Unauthenticated View */
    .unauthenticated {
      text-align: center;
    }

    .logo {
      margin: 0 auto 20px;
      width: 64px;
      height: 64px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .description {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .feature-text {
      text-align: center;
    }

    .feature-title {
      font-size: 11px;
      font-weight: 600;
      color: #e2e8f0;
      display: block;
      margin-bottom: 2px;
    }

    .feature-desc {
      font-size: 9px;
      color: #94a3b8;
      display: block;
    }

    /* Authenticated View */
    .authenticated {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-email {
      font-size: 12px;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tier-badge {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tier-badge.free {
      background: rgba(148, 163, 184, 0.2);
      color: #cbd5e1;
    }

    .tier-badge.starter {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .tier-badge.pro {
      background: rgba(168, 85, 247, 0.2);
      color: #c084fc;
    }

    .tier-badge.premium {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #10b981;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Feature List */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      text-align: left;
    }

    .feature-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(168, 85, 247, 0.3);
      transform: translateY(-1px);
    }

    .feature-btn .feature-icon {
      font-size: 24px;
    }

    .feature-btn .feature-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-btn .feature-title {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .feature-btn .feature-desc {
      font-size: 11px;
      color: #94a3b8;
    }

    /* Buttons */
    .btn-primary, .btn-secondary {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .help-text {
      margin-top: 12px;
      font-size: 11px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="authContainer">
    <!-- Content will be dynamically inserted -->
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
